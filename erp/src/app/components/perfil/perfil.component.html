<p-toast></p-toast>
<p-confirmdialog></p-confirmdialog>

<div class="page-container w-full max-w-full p-4" style="background-color: var(--r4u-bg-page); min-height: 100vh;">

    <div class="page-header">
        <h2 style="color: var(--r4u-text-main);">Perfil de Usuario</h2>
        <p style="color: var(--r4u-text-muted);">Información y datos de tu cuenta personal.</p>
    </div>

    <div class="grid justify-content-center">
        <div class="col-12 lg:col-6">
            <div class="card-wrapper w-full">
                <p-card class="perfil-card">
                    <ng-template pTemplate="header">
                        <div class="card-header-bar">
                            <i class="pi pi-user card-header-icon"></i>
                            <span class="card-header-title" style="color: var(--r4u-text-main);">Datos del Usuario</span>
                        </div>
                    </ng-template>

                    <div class="user-avatar-block">
                        <p-avatar
                            [label]="isLoggedIn ? (profileName.charAt(0) | uppercase) : '?'"
                            size="xlarge"
                            shape="circle"
                            class="user-avatar"
                        ></p-avatar>
                        @if (isLoggedIn) {
                        <div class="user-meta">
                            <span class="user-name-label" style="color: var(--r4u-text-main);">{{ profileName }}</span>
                            <span class="user-role-badge">{{ profileRole }}</span>
                        </div>
                        }
                    </div>

                    <div class="user-fields">
                        <div class="field-group">
                            <label class="field-label" style="color: var(--r4u-text-muted);">Nombre Completo</label>
                            <input type="text" pInputText [(ngModel)]="profileName" [disabled]="!editMode" class="w-full" />
                        </div>

                        <div class="field-group">
                            <label class="field-label" style="color: var(--r4u-text-muted);">Correo Electrónico</label>
                            <input type="text" pInputText [disabled]="true" [value]="isLoggedIn ? currentUser : '—'" class="w-full" />
                        </div>

                        <div class="field-group">
                            <label class="field-label" style="color: var(--r4u-text-muted);">Teléfono</label>
                            <input type="text" pInputText [disabled]="!editMode" [(ngModel)]="userData.telefono" class="w-full" />
                        </div>
                        <div class="field-group">
                            <label class="field-label" style="color: var(--r4u-text-muted);">Dirección</label>
                            <input type="text" pInputText [disabled]="!editMode" [(ngModel)]="userData.direccion" class="w-full" />
                        </div>
                    </div>

                    <div class="user-actions">
                        @if (editMode) {
                            <p-button label="Guardar" icon="pi pi-check" size="small" (onClick)="saveProfile()"></p-button>
                            <p-button label="Cancelar" icon="pi pi-times" size="small" severity="secondary" [text]="true" (onClick)="editMode = false"></p-button>
                        } @else {
                            <p-button label="Editar Perfil" icon="pi pi-user-edit" size="small" (onClick)="editMode = true"></p-button>
                            <p-button label="Cerrar Sesión" icon="pi pi-sign-out" size="small" severity="danger" [outlined]="true" (onClick)="logout()" class="ml-2"></p-button>
                        }
                    </div>
                </p-card>
            </div>
        </div>
    </div>
</div>
