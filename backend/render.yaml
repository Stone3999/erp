services:
  # 1. User Service
  - type: web
    name: user-service
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:user
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  # 2. Tickets Service
  - type: web
    name: tickets-service
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:tickets
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # 3. Groups Service
  - type: web
    name: groups-service
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:groups
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # 4. API Gateway (El Cadenero principal)
  - type: web
    name: api-gateway
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:gateway
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      # En Render, los servicios se pueden comunicar internamente con http://<nombre-servicio>:<puerto-interno>
      - key: USER_SERVICE_URL
        value: http://user-service:10000
      - key: TICKETS_SERVICE_URL
        value: http://tickets-service:10000
      - key: GROUPS_SERVICE_URL
        value: http://groups-service:10000
